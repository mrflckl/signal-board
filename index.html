<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Themenbewertung</title>
  <style>
    :root{--acc:#001E46;--lime:#CDFF00;--star:#f59e0b;--emp:#e2e8f0;--grn:#16a34a;--bg:#f0f2f5;--card:#ffffff;--bdr:#e2e8f0;--txt:#1e293b;--mut:#64748b;--r:10px;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;}
    .wrap{max-width:700px;margin:0 auto;padding:28px 16px 60px;}
    .hdr{background:var(--acc);border-radius:var(--r);padding:24px 28px;margin-bottom:24px;box-shadow:0 4px 20px rgba(0,30,70,.18);}
    .hdr-tag{font-size:.65rem;font-weight:700;color:var(--lime);text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px;}
    .hdr h1{font-size:1.25rem;font-weight:700;color:#fff;margin:0 0 4px;line-height:1.25;}
    .hdr-sub{font-size:.82rem;color:rgba(255,255,255,.55);}
    .sec-label{display:inline-flex;align-items:center;gap:6px;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:#fff;border-radius:5px;padding:4px 12px;margin-bottom:10px;}
    .sec-label.acc{background:#16a34a;}.sec-label.rej{background:#64748b;}
    .sec-hint{font-size:.78rem;color:var(--mut);margin-bottom:12px;font-style:italic;}
    .card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:18px 20px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
    .card-num{font-size:.68rem;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
    .card-title{font-size:1rem;font-weight:700;color:var(--acc);line-height:1.35;margin-bottom:16px;}
    .card-title.rej{color:var(--mut);}
    .field{margin-bottom:14px;}.field:last-child{margin-bottom:0;}
    .field-label{font-size:.7rem;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;}
    .field-hint{font-size:.73rem;color:var(--mut);margin-bottom:6px;font-style:italic;}
    .row{display:flex;gap:16px;flex-wrap:wrap;}.row .field{flex:1;min-width:130px;}
    .stars{display:flex;gap:1px;cursor:pointer;user-select:none;width:fit-content;}
    .stars span{font-size:1.7rem;color:var(--emp);line-height:1;transition:color .1s,transform .1s;padding:0 1px;}
    .stars span.on{color:var(--star);}.stars span.hov{color:#fbbf24;transform:scale(1.15);}
    .btns{display:flex;gap:8px;flex-wrap:wrap;}
    .btn{border:1.5px solid var(--bdr);background:#fff;border-radius:6px;padding:6px 14px;font-size:.82rem;font-weight:600;cursor:pointer;color:var(--mut);transition:all .15s;white-space:nowrap;}
    .btn:hover{border-color:#94a3b8;background:#f8fafc;}
    .btn.on-yes{border-color:#16a34a;background:#f0fdf4;color:#15803d;}
    .btn.on-no{border-color:#94a3b8;background:#f8fafc;color:#475569;}
    .btn.on-bad{border-color:#ef4444;background:#fef2f2;color:#dc2626;}
    .btn.on-avg{border-color:#64748b;background:#f8fafc;color:#475569;}
    .btn.on-gut{border-color:#16a34a;background:#f0fdf4;color:#15803d;}
    textarea{width:100%;border:1.5px solid var(--bdr);border-radius:6px;padding:9px 11px;font-size:.85rem;font-family:inherit;color:var(--txt);background:#fff;resize:vertical;min-height:54px;transition:border-color .15s;line-height:1.5;}
    textarea:focus{outline:none;border-color:#6366f1;}
    .divider{height:1px;background:var(--bdr);margin:24px 0;}
    .save{width:100%;background:var(--acc);color:#fff;border:none;border-radius:var(--r);padding:15px;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .2s,transform .1s;letter-spacing:.01em;}
    .save:hover{opacity:.92;transform:translateY(-1px);}
    .save:disabled{opacity:.4;cursor:not-allowed;transform:none;}
    .msg{border-radius:var(--r);padding:14px 16px;margin-top:14px;font-size:.88rem;font-weight:600;line-height:1.5;}
    .msg.ok{background:#f0fdf4;color:#15803d;border:1.5px solid #bbf7d0;}
    .msg.err{background:#fef2f2;color:#dc2626;border:1.5px solid #fecaca;}
    #no-data{text-align:center;padding:72px 20px;color:var(--mut);}
    #no-data .ico{font-size:2.5rem;margin-bottom:16px;}
    #no-data h2{font-size:1.15rem;color:var(--txt);margin-bottom:8px;}
  </style>
</head>
<body>
<div class="wrap">
  <div id="no-data" style="display:none">
    <div class="ico">🔒</div>
    <h2>Kein Link erkannt</h2>
    <p>Bitte öffne diese Seite über den Link in der Tagesbrief-Mail.</p>
  </div>
  <div id="app" style="display:none">
    <div class="hdr">
      <div class="hdr-tag">BR24 · Themenbewertung</div>
      <h1 id="hdr-title">Themenbewertung</h1>
      <div class="hdr-sub" id="hdr-sub"></div>
    </div>
    <div id="acc-section"></div>
    <div class="divider" id="rej-divider" style="display:none"></div>
    <div id="rej-section" style="display:none">
      <span class="sec-label rej">✕ Abgelehnte Themen</span>
      <p class="sec-hint">Markiere Themen die du lieber gehabt hättest.</p>
      <div id="rej-cards"></div>
    </div>
    <div style="margin-top:24px;">
      <button class="save" id="save-btn" onclick="saveAll()">Bewertung speichern →</button>
      <div id="msg"></div>
    </div>
  </div>
</div>
<script>
'use strict';
let G=null;

// UTF-8-sichere Base64-Dekodierung
function b64ToUtf8(b64){
  const bytes=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
  return new TextDecoder('utf-8').decode(bytes);
}

function parseHash(){
  const h=location.hash.slice(1);if(!h)return null;
  const p=new URLSearchParams(h);
  const t=p.get('t'),d=p.get('d');if(!t||!d)return null;
  try{return{token:t,data:JSON.parse(b64ToUtf8(d))};}catch{return null;}
}

async function deriveKey(token){
  const raw=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(token));
  return crypto.subtle.importKey('raw',raw,{name:'AES-GCM'},false,['encrypt']);
}
async function encrypt(text,token){
  const key=await deriveKey(token);
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const enc=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(text));
  const out=new Uint8Array(12+enc.byteLength);
  out.set(iv);out.set(new Uint8Array(enc),12);
  return btoa(Array.from(out,b=>String.fromCharCode(b)).join(''));
}

const GIST_DESC='sb-feedback-v1';
async function ghFetch(url,opts,token){
  const r=await fetch(url,{...opts,headers:{'Authorization':`token ${token}`,'Content-Type':'application/json'}});
  if(!r.ok)throw new Error(`GitHub ${r.status}`);return r.json();
}
async function saveToGist(token,filename,content){
  let gistId=null;
  for(let page=1;page<=5&&!gistId;page++){
    const list=await ghFetch(`https://api.github.com/gists?per_page=100&page=${page}`,{},token);
    if(!list.length)break;
    const f=list.find(g=>g.description===GIST_DESC);if(f)gistId=f.id;
  }
  const body=JSON.stringify({files:{[filename]:{content}}});
  if(gistId){await ghFetch(`https://api.github.com/gists/${gistId}`,{method:'PATCH',body},token);}
  else{await ghFetch('https://api.github.com/gists',{method:'POST',body:JSON.stringify({description:GIST_DESC,public:false,files:{[filename]:{content}}})},token);}
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function starsHtml(uid){
  return`<div class="stars" id="s-${uid}" data-val=""
    onmouseover="hStar(event,'${uid}')" onmouseout="uStar('${uid}')" onclick="cStar(event,'${uid}')">` +
    [1,2,3,4,5].map(v=>`<span data-v="${v}">★</span>`).join('')+'</div>';
}
function hStar(e,uid){const v=parseInt(e.target.dataset.v);if(!v)return;document.getElementById('s-'+uid).querySelectorAll('span').forEach((s,i)=>s.classList.toggle('hov',i<v));}
function uStar(uid){const el=document.getElementById('s-'+uid);const c=parseInt(el.dataset.val)||0;el.querySelectorAll('span').forEach((s,i)=>{s.classList.remove('hov');s.classList.toggle('on',i<c);});}
function cStar(e,uid){const v=parseInt(e.target.dataset.v);if(!v)return;const el=document.getElementById('s-'+uid);el.dataset.val=v;el.querySelectorAll('span').forEach((s,i)=>{s.classList.toggle('on',i<v);s.classList.remove('hov');});}
function gStar(uid){const el=document.getElementById('s-'+uid);return el?(parseInt(el.dataset.val)||null):null;}

function btnsHtml(uid,items){
  return`<div class="btns" id="tg-${uid}" data-val="">` +
    items.map(([v,l])=>`<button class="btn" data-v="${v}" onclick="setBtn('${uid}','${v}')">${l}</button>`).join('')+'</div>';
}
function setBtn(uid,val){
  const el=document.getElementById('tg-'+uid);if(!el)return;
  el.dataset.val=val;
  el.querySelectorAll('button').forEach(b=>{b.className='btn';
    if(b.dataset.v===val)b.classList.add(val==='ja'||val==='gut'?'on-yes':val==='nein'?'on-no':val==='schlecht'?'on-bad':val==='durch'?'on-avg':'on-gut');
  });
}
function gBtn(uid){const el=document.getElementById('tg-'+uid);if(!el)return null;const v=el.dataset.val;if(v==='ja')return true;if(v==='nein')return false;return v||null;}
function tVal(id){return(document.getElementById(id)?.value||'').trim()||null;}

// Zufälliger 4-Zeichen Suffix – damit mehrere Bewertungen nicht überschrieben werden
function randomSuffix(){return Math.random().toString(36).slice(2,6);}

function accCard(t,i){const id=t.id;return`
<div class="card">
  <div class="card-num">Thema ${i}</div>
  <div class="card-title">${esc(t.t)}</div>
  <div class="row">
    <div class="field"><div class="field-label">Thema</div><div class="field-hint">War das Thema gut gewählt?</div>${starsHtml('th-'+id)}</div>
    <div class="field"><div class="field-label">Vorschläge</div><div class="field-hint">Waren Ansatz und Ideen gut?</div>${starsHtml('vs-'+id)}</div>
  </div>
  <div class="field"><div class="field-label">Umgesetzt?</div>${btnsHtml('um-'+id,[['ja','✓ Ja'],['nein','Nein']])}</div>
  <div class="field"><div class="field-label">Performance <span style="font-weight:400;">(optional, nachträglich)</span></div>${btnsHtml('pf-'+id,[['schlecht','↓ Schlecht'],['durch','→ Durchschnittlich'],['gut','↑ Stark']])}</div>
  <div class="field"><div class="field-label">Anmerkungen <span style="font-weight:400;">(optional)</span></div><textarea id="an-${id}" placeholder="Feedback, Ideen, Einschätzungen …"></textarea></div>
</div>`;}

function rejCard(t,i){const id=t.id;return`
<div class="card">
  <div class="card-num">Abgelehnt ${i}</div>
  <div class="card-title rej">${esc(t.t)}</div>
  <div class="field"><div class="field-label">Hätte ich gewollt?</div>${btnsHtml('hw-'+id,[['ja','✓ Ja, hätte gepasst'],['nein','Nein, richtig abgelehnt']])}</div>
  <div class="field"><div class="field-label">Thema-Qualität</div>${starsHtml('tq-'+id)}</div>
  <div class="field"><div class="field-label">Begründung <span style="font-weight:400;">(optional)</span></div><textarea id="bg-${id}" placeholder="Warum wärst du anders entschieden?"></textarea></div>
</div>`;}

async function saveAll(){
  const btn=document.getElementById('save-btn');
  const msgEl=document.getElementById('msg');
  btn.disabled=true;btn.textContent='Speichert …';
  msgEl.textContent='';msgEl.className='msg';
  try{
    const ratings=[];
    for(const t of(G.data.a||[])){ratings.push({id:t.id,titel:t.t,format:t.f||'',ressort:t.r||'',accepted:true,thema_qualitaet:gStar('th-'+t.id),vorschlaege_qualitaet:gStar('vs-'+t.id),umgesetzt:gBtn('um-'+t.id),performance:gBtn('pf-'+t.id),anmerkungen:tVal('an-'+t.id)});}
    for(const t of(G.data.r||[])){const hw=gBtn('hw-'+t.id);if(hw===null)continue;ratings.push({id:t.id,titel:t.t,accepted:false,haette_ich_gewollt:hw,thema_qualitaet:gStar('tq-'+t.id),begruendung:tVal('bg-'+t.id)});}
    const payload=JSON.stringify({date:G.data.d,saved_at:new Date().toISOString(),ratings});
    const encrypted=await encrypt(payload,G.token);
    // Zufälliger Suffix: jede Person bekommt eigene Datei, kein Überschreiben
    const filename=`fb_${G.data.d}_${randomSuffix()}.json`;
    await saveToGist(G.token,filename,encrypted);
    btn.textContent='✓ Gespeichert';
    msgEl.textContent='Bewertung erfolgreich gespeichert. Du kannst die Seite schließen.';
    msgEl.className='msg ok';
  }catch(e){btn.disabled=false;btn.textContent='Nochmal versuchen';msgEl.textContent=`Fehler: ${e.message}`;msgEl.className='msg err';}
}

(function init(){
  G=parseHash();
  if(!G||!G.data){document.getElementById('no-data').style.display='block';return;}
  document.getElementById('app').style.display='block';
  let dl=G.data.d||'';
  if(/^\d{4}-\d{2}-\d{2}$/.test(dl)){const[y,m,d]=dl.split('-');dl=`${d}.${m}.${y}`;}
  document.getElementById('hdr-title').textContent=`Themenbewertung ${dl}`;
  document.getElementById('hdr-sub').textContent=`${(G.data.a||[]).length} ausgewählte · ${(G.data.r||[]).length} abgelehnte Themen`;
  const a=document.getElementById('acc-section');
  if((G.data.a||[]).length){a.insertAdjacentHTML('beforeend','<span class="sec-label acc">✓ Ausgewählte Themen</span>');G.data.a.forEach((t,i)=>a.insertAdjacentHTML('beforeend',accCard(t,i+1)));}
  if((G.data.r||[]).length){document.getElementById('rej-section').style.display='block';document.getElementById('rej-divider').style.display='block';const rc=document.getElementById('rej-cards');G.data.r.forEach((t,i)=>rc.insertAdjacentHTML('beforeend',rejCard(t,i+1)));}
})();
</script>
</body>
</html>
