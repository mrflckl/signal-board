<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bewertung</title>
  <style>
    :root {
      --acc:  #001E46;
      --star: #f59e0b;
      --emp:  #d1d5db;
      --grn:  #16a34a;
      --bg:   #f8fafc;
      --card: #ffffff;
      --bdr:  #e2e8f0;
      --txt:  #1e293b;
      --mut:  #64748b;
      --r: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
           background: var(--bg); color: var(--txt); min-height: 100vh; }
    .wrap { max-width: 680px; margin: 0 auto; padding: 24px 16px 56px; }
    .hdr { background: var(--acc); color: #fff; border-radius: var(--r);
           padding: 22px 26px; margin-bottom: 20px; }
    .hdr h1 { font-size: 1.1rem; font-weight: 700; }
    .hdr p  { font-size: .82rem; opacity: .65; margin-top: 4px; }
    .sec-label { font-size: .68rem; font-weight: 800; text-transform: uppercase;
                 letter-spacing: .1em; color: #fff; border-radius: 4px;
                 padding: 3px 10px; display: inline-block; margin-bottom: 8px; }
    .sec-label.acc { background: #16a34a; }
    .sec-label.rej { background: #6b7280; }
    .sec-hint { font-size: .78rem; color: var(--mut); margin-bottom: 10px; }
    .card { background: var(--card); border: 1px solid var(--bdr);
            border-radius: var(--r); padding: 16px 18px; margin-bottom: 10px; }
    .card-title { font-size: .98rem; font-weight: 700; color: var(--acc);
                  margin-bottom: 14px; line-height: 1.35; }
    .card-title.rej { color: var(--mut); }
    .field { margin-bottom: 12px; }
    .field-label { font-size: .72rem; font-weight: 600; color: var(--mut);
                   text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px; }
    .field-hint { font-size: .73rem; color: var(--mut); margin-bottom: 5px; }
    .row { display: flex; gap: 20px; flex-wrap: wrap; }
    .row .field { flex: 1; min-width: 120px; }
    .stars { display: flex; gap: 2px; cursor: pointer; user-select: none; }
    .stars span { font-size: 1.6rem; color: var(--emp); line-height: 1; transition: color .1s; }
    .stars span.on { color: var(--star); }
    .btns { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn { border: 1px solid var(--bdr); background: #fff; border-radius: 5px;
           padding: 5px 13px; font-size: .83rem; font-weight: 600;
           cursor: pointer; color: var(--mut); transition: all .15s; }
    .btn.on-yes  { border-color: var(--grn); background: #dcfce7; color: #15803d; }
    .btn.on-no   { border-color: #d1d5db;   background: #f9fafb; color: var(--mut); }
    .btn.on-bad  { border-color: #dc2626;   background: #fee2e2; color: #b91c1c; }
    .btn.on-avg  { border-color: #94a3b8;   background: #f1f5f9; color: #475569; }
    .btn.on-good { border-color: var(--grn); background: #dcfce7; color: #15803d; }
    textarea { width: 100%; border: 1px solid var(--bdr); border-radius: 5px;
               padding: 8px 10px; font-size: .85rem; font-family: inherit;
               color: var(--txt); resize: vertical; min-height: 50px; }
    textarea:focus { outline: none; border-color: #0055cc; }
    .divider { height: 1px; background: var(--bdr); margin: 20px 0; }
    .save { width: 100%; background: var(--acc); color: #fff; border: none;
            border-radius: var(--r); padding: 14px; font-size: 1rem; font-weight: 700;
            cursor: pointer; margin-top: 20px; transition: opacity .2s; }
    .save:hover { opacity: .88; }
    .save:disabled { opacity: .45; cursor: not-allowed; }
    .msg { border-radius: var(--r); padding: 13px 16px; margin-top: 14px;
           font-size: .88rem; font-weight: 600; }
    .msg.ok  { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
    .msg.err { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
    #no-data { text-align: center; padding: 64px 20px; color: var(--mut); }
    #no-data h2 { font-size: 1.1rem; margin-bottom: 8px; color: var(--txt); }
  </style>
</head>
<body>
<div class="wrap">
  <div id="no-data" style="display:none">
    <h2>Kein Link erkannt</h2>
    <p>Bitte öffne diese Seite über den Link in der Tagesbrief-Mail.</p>
  </div>
  <div id="app" style="display:none">
    <div class="hdr">
      <h1 id="hdr-title">Themenbewertung</h1>
      <p id="hdr-sub"></p>
    </div>
    <div id="acc-section"></div>
    <div class="divider" id="rej-divider" style="display:none"></div>
    <div id="rej-section" style="display:none">
      <span class="sec-label rej">Abgelehnte Themen</span>
      <p class="sec-hint">Markiere Themen die du lieber gehabt hättest.</p>
      <div id="rej-cards"></div>
    </div>
    <button class="save" id="save-btn" onclick="saveAll()">Bewertung speichern</button>
    <div id="msg"></div>
  </div>
</div>
<script>
let G = null;

function parseHash() {
  const h = location.hash.slice(1);
  if (!h) return null;
  const p = new URLSearchParams(h);
  const t = p.get('t'), d = p.get('d');
  if (!t || !d) return null;
  try { return { token: t, data: JSON.parse(atob(d)) }; }
  catch { return null; }
}

async function deriveKey(token) {
  const raw = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(token));
  return crypto.subtle.importKey('raw', raw, {name:'AES-GCM'}, false, ['encrypt']);
}

async function encrypt(text, token) {
  const key = await deriveKey(token);
  const iv  = crypto.getRandomValues(new Uint8Array(12));
  const enc = await crypto.subtle.encrypt({name:'AES-GCM',iv}, key, new TextEncoder().encode(text));
  const out = new Uint8Array(12 + enc.byteLength);
  out.set(iv); out.set(new Uint8Array(enc), 12);
  return btoa(Array.from(out, b => String.fromCharCode(b)).join(''));
}

const GIST_DESC = 'sb-feedback-v1';
async function ghFetch(url, opts, token) {
  const r = await fetch(url, {...opts, headers:{'Authorization':`token ${token}`,'Content-Type':'application/json'}});
  if (!r.ok) throw new Error(`GitHub ${r.status}: ${await r.text()}`);
  return r.json();
}
async function saveToGist(token, filename, content) {
  let gistId = null;
  for (let page = 1; page <= 5 && !gistId; page++) {
    const list = await ghFetch(`https://api.github.com/gists?per_page=100&page=${page}`, {}, token);
    if (!list.length) break;
    const f = list.find(g => g.description === GIST_DESC);
    if (f) gistId = f.id;
  }
  if (gistId) {
    await ghFetch(`https://api.github.com/gists/${gistId}`,
      {method:'PATCH', body: JSON.stringify({files:{[filename]:{content}}})}, token);
  } else {
    await ghFetch('https://api.github.com/gists',
      {method:'POST', body: JSON.stringify({description:GIST_DESC, public:false, files:{[filename]:{content}}})}, token);
  }
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function starsHtml(uid) {
  return `<div class="stars" id="s-${uid}" data-val="">` +
    [1,2,3,4,5].map(v=>`<span data-v="${v}" onclick="setStar('${uid}',${v})">★</span>`).join('') + '</div>';
}
function setStar(uid, val) {
  const el = document.getElementById('s-'+uid);
  el.querySelectorAll('span').forEach((s,i) => s.classList.toggle('on', i < val));
  el.dataset.val = val;
}
function getStarVal(uid) {
  const el = document.getElementById('s-'+uid);
  return el ? (parseInt(el.dataset.val)||null) : null;
}

function btnsHtml(uid, items) {
  return `<div class="btns" id="tg-${uid}" data-val="">` +
    items.map(([v,label])=>`<button class="btn" data-v="${v}" onclick="setBtn('${uid}','${v}')">${label}</button>`).join('') +
    '</div>';
}
function setBtn(uid, val) {
  const el = document.getElementById('tg-'+uid);
  el.dataset.val = val;
  el.querySelectorAll('button').forEach(b => {
    b.className = 'btn';
    if (b.dataset.v === val) {
      if (val==='ja'||val==='top') b.classList.add('on-yes');
      else if (val==='nein') b.classList.add('on-no');
      else if (val==='schlecht') b.classList.add('on-bad');
      else if (val==='durch') b.classList.add('on-avg');
      else if (val==='gut') b.classList.add('on-good');
    }
  });
}
function getBtnVal(uid) {
  const el = document.getElementById('tg-'+uid);
  if (!el) return null;
  const v = el.dataset.val;
  if (v==='ja') return true;
  if (v==='nein') return false;
  return v || null;
}
function txtVal(id) { return (document.getElementById(id)?.value||'').trim()||null; }

function buildAccCard(t) {
  const id = t.id;
  return `
<div class="card">
  <div class="card-title">${esc(t.t)}</div>
  <div class="row">
    <div class="field">
      <div class="field-label">Thema</div>
      <div class="field-hint">War das Thema gut gewählt?</div>
      ${starsHtml('th-'+id)}
    </div>
    <div class="field">
      <div class="field-label">Vorschläge</div>
      <div class="field-hint">Waren Ansatz und Ideen gut?</div>
      ${starsHtml('vs-'+id)}
    </div>
  </div>
  <div class="field">
    <div class="field-label">Umgesetzt?</div>
    ${btnsHtml('um-'+id, [['ja','Ja ✓'],['nein','Nein']])}
  </div>
  <div class="field">
    <div class="field-label">Performance <span style="font-weight:400;font-size:.7rem;">(kann nachgetragen werden)</span></div>
    ${btnsHtml('pf-'+id, [['schlecht','↓ Schlecht'],['durch','→ Durchschnittlich'],['gut','↑ Überdurchschnittlich']])}
  </div>
  <div class="field">
    <div class="field-label">Anmerkungen <span style="font-weight:400;">(optional)</span></div>
    <textarea id="an-${id}" placeholder="Feedback, Ideen, Einschätzungen…"></textarea>
  </div>
</div>`;
}

function buildRejCard(t) {
  const id = t.id;
  return `
<div class="card">
  <div class="card-title rej">${esc(t.t)}</div>
  <div class="field">
    <div class="field-label">Hätte ich gewollt?</div>
    ${btnsHtml('hw-'+id, [['ja','Ja, hätte gepasst'],['nein','Nein, passt nicht']])}
  </div>
  <div class="field">
    <div class="field-label">Thema-Qualität</div>
    ${starsHtml('tq-'+id)}
  </div>
  <div class="field">
    <div class="field-label">Begründung <span style="font-weight:400;">(optional)</span></div>
    <textarea id="bg-${id}" placeholder="Warum wärst du anders entschieden?"></textarea>
  </div>
</div>`;
}

async function saveAll() {
  const btn = document.getElementById('save-btn');
  const msgEl = document.getElementById('msg');
  btn.disabled = true; btn.textContent = 'Speichert…';
  msgEl.textContent = ''; msgEl.className = 'msg';
  try {
    const ratings = [];
    for (const t of (G.data.a||[])) {
      ratings.push({
        id: t.id, titel: t.t, format: t.f||'', ressort: t.r||'',
        accepted: true,
        thema_qualitaet:     getStarVal('th-'+t.id),
        vorschlaege_qualitaet: getStarVal('vs-'+t.id),
        umgesetzt:           getBtnVal('um-'+t.id),
        performance:         getBtnVal('pf-'+t.id),
        anmerkungen:         txtVal('an-'+t.id),
      });
    }
    for (const t of (G.data.r||[])) {
      const hw = getBtnVal('hw-'+t.id);
      if (hw === null) continue;
      ratings.push({
        id: t.id, titel: t.t, accepted: false,
        haette_ich_gewollt: hw,
        thema_qualitaet:    getStarVal('tq-'+t.id),
        begruendung:        txtVal('bg-'+t.id),
      });
    }
    const payload = JSON.stringify({date: G.data.d, saved_at: new Date().toISOString(), ratings});
    const encrypted = await encrypt(payload, G.token);
    await saveToGist(G.token, `fb_${G.data.d}.json`, encrypted);
    btn.textContent = '✓ Gespeichert';
    msgEl.textContent = 'Bewertung gespeichert. Du kannst die Seite schließen.';
    msgEl.className = 'msg ok';
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Nochmal versuchen';
    msgEl.textContent = `Fehler: ${e.message}`; msgEl.className = 'msg err';
  }
}

(function init() {
  G = parseHash();
  if (!G||!G.data) { document.getElementById('no-data').style.display='block'; return; }
  document.getElementById('app').style.display='block';
  let dl = G.data.d||'';
  if (/^\d{4}-\d{2}-\d{2}$/.test(dl)) { const [y,m,d]=dl.split('-'); dl=`${d}.${m}.${y}`; }
  document.getElementById('hdr-title').textContent = `Themenbewertung ${dl}`;
  document.getElementById('hdr-sub').textContent =
    `${(G.data.a||[]).length} ausgewählte · ${(G.data.r||[]).length} abgelehnte Themen`;
  const accSec = document.getElementById('acc-section');
  if ((G.data.a||[]).length) {
    accSec.insertAdjacentHTML('beforeend','<span class="sec-label acc">Ausgewählte Themen</span>');
    G.data.a.forEach(t => accSec.insertAdjacentHTML('beforeend', buildAccCard(t)));
  }
  if ((G.data.r||[]).length) {
    document.getElementById('rej-section').style.display='block';
    document.getElementById('rej-divider').style.display='block';
    const rc = document.getElementById('rej-cards');
    G.data.r.forEach(t => rc.insertAdjacentHTML('beforeend', buildRejCard(t)));
  }
})();
</script>
</body>
</html>
